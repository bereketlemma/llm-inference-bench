name: Benchmark Regression Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy pandas matplotlib pyyaml

      - name: Run unit tests with coverage
        run: pytest tests/ -v --tb=short --cov=benchmark --cov-report=term-missing

      - name: Validate module imports
        run: |
          python -c "from benchmark.metrics import calculate_metrics, compute_speedup; print('✓ metrics')"
          python -c "from benchmark.config import BenchmarkConfig; c = BenchmarkConfig.development_config(); print('✓ config')"
          python -c "from visualize.plot_results import plot_latency_comparison; print('✓ visualize')"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8
        run: >
          flake8 benchmark/ tests/ visualize/ main.py
          --max-line-length=100 --ignore=E501,E402

