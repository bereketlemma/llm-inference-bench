name: Benchmark Regression Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas matplotlib pyyaml

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      - name: Check code structure
        run: |
          python -c "from benchmark.metrics import calculate_metrics, compute_speedup; print('Metrics OK')"
          python -c "from benchmark.config import BenchmarkConfig; print('Config OK')"

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install linting tools
        run: pip install flake8
      - name: Run linter
        run: flake8 benchmark/ tests/ visualize/ main.py --max-line-length=100 --ignore=E501,E402